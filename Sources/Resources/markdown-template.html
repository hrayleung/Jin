<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
:root {
    color-scheme: light dark;
    --body-font: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
    --code-font: 'SF Mono', Menlo, monospace;
    --body-font-size: 14px;
    --inline-code-bg: light-dark(hsla(230, 1%, 96%, 0.96), hsla(220, 13%, 20%, 0.96));
    --inline-code-border: light-dark(hsla(230, 8%, 24%, 0.10), hsla(220, 14%, 71%, 0.12));
    --code-surface: light-dark(hsl(230, 1%, 98%), hsl(220, 13%, 18%));
    --code-surface-raised: light-dark(hsl(230, 1%, 97%), hsl(220, 13%, 19%));
    --code-border: light-dark(hsla(230, 8%, 24%, 0.10), hsla(220, 14%, 71%, 0.12));
    --code-separator: light-dark(hsla(230, 8%, 24%, 0.08), hsla(220, 14%, 71%, 0.12));
    --code-text: light-dark(hsl(230, 8%, 24%), hsl(220, 14%, 71%));
    --code-muted: light-dark(hsl(230, 6%, 44%), hsl(220, 9%, 55%));
    --code-selection: light-dark(hsl(230, 1%, 90%), hsl(220, 13%, 28%));
    --code-header-top: light-dark(hsl(230, 1%, 98%), hsl(220, 13%, 20%));
    --code-header-bottom: light-dark(hsl(230, 1%, 96%), hsl(220, 13%, 18%));
    --code-button-hover-bg: light-dark(rgba(0, 0, 0, 0.045), rgba(255, 255, 255, 0.06));
    --code-button-hover-fg: light-dark(hsl(0, 0%, 22%), hsl(0, 0%, 84%));
    --code-button-active-bg: light-dark(rgba(0, 0, 0, 0.07), rgba(255, 255, 255, 0.10));
    --code-shadow: light-dark(0 10px 24px rgba(15, 23, 42, 0.05), 0 12px 28px rgba(2, 8, 23, 0.28));
    --reader-highlight-bg: light-dark(rgba(250, 231, 133, 0.78), rgba(214, 161, 32, 0.34));
    --reader-highlight-stroke: light-dark(rgba(192, 144, 22, 0.24), rgba(255, 215, 96, 0.18));
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { overflow: hidden; }
body {
    font-family: var(--body-font);
    font-size: var(--body-font-size);
    line-height: 1.6;
    color: light-dark(#1d1d1f, #f5f5f7);
    background: transparent;
    word-wrap: break-word;
    overflow-wrap: break-word;
    -webkit-user-select: text;
    padding: 0;
}
#content {
    display: flow-root;
}
#content > :last-child {
    margin-bottom: 0 !important;
}
h1, h2, h3, h4, h5, h6 { margin-top: 1em; margin-bottom: 0.5em; font-weight: 600; }
h1 { font-size: 1.6em; } h2 { font-size: 1.4em; } h3 { font-size: 1.2em; } h4 { font-size: 1.1em; }
p { margin-bottom: 0.6em; }
p:last-child { margin-bottom: 0; }
.plain-text-content {
    white-space: pre-wrap;
    word-break: break-word;
    overflow-wrap: anywhere;
}
mark[data-jin-highlight-id] {
    background: var(--reader-highlight-bg);
    color: inherit;
    border-radius: 0.32em;
    padding: 0.02em 0.05em;
    box-shadow: inset 0 -1px 0 var(--reader-highlight-stroke);
}
mark[data-jin-highlight-id]::selection {
    background: color-mix(in srgb, var(--reader-highlight-bg) 72%, white 28%);
}
a { color: light-dark(#0066cc, #4ca6ff); text-decoration: none; }
a:hover { text-decoration: underline; }
code {
    font-family: var(--code-font);
    font-size: 0.88em;
    background: var(--inline-code-bg);
    padding: 0.15em 0.4em;
    border-radius: 5px;
    border: 0.5px solid var(--inline-code-border);
}
pre {
    margin: 0.6em 0;
    border-radius: 8px;
    overflow-x: auto;
    background: var(--code-surface) !important;
    position: relative;
    border: 1px solid var(--code-border);
}
pre code {
    display: block;
    padding: 0.8em 1em;
    background: none;
    font-size: 0.85em;
    line-height: 1.5;
    white-space: pre;
    overflow-x: auto;
}
.code-block {
    margin: 0.65em 0;
    border: 1px solid var(--code-border);
    border-radius: 12px;
    overflow: hidden;
    background: var(--code-surface);
    box-shadow: var(--code-shadow);
}
.code-block pre {
    margin: 0;
    border: none;
    border-radius: 0;
    background: transparent !important;
}
.code-block pre code {
    padding: 0.95em 1.05em 1.05em;
}
.code-block .code-content {
    display: block;
    background: var(--code-surface);
}
.code-block .code-content[hidden] {
    display: none !important;
}
.code-block .code-content-wrapper[hidden] {
    display: none !important;
}
.code-block .code-raw[hidden],
.code-block .code-preview[hidden] {
    display: none !important;
}
.code-block .prism-code {
    margin: 0 !important;
    border-radius: 0 0 12px 12px !important;
    background: transparent !important;
    color: var(--code-text) !important;
    padding: 0.95em 1.05em 1.05em;
    font-size: 0.85em;
    line-height: 1.58;
    white-space: pre;
    overflow-x: auto;
    font-style: normal;
    text-shadow: none;
    tab-size: 4;
}
.code-block .prism-code::selection,
.code-block .prism-code *::selection {
    background: var(--code-selection);
    color: inherit;
}
/* Prism One Light / One Dark token colors */
.code-block .prism-code .token.comment,
.code-block .prism-code .token.prolog,
.code-block .prism-code .token.cdata {
    color: light-dark(hsl(230, 4%, 64%), hsl(220, 10%, 40%));
}
.code-block .prism-code .token.doctype,
.code-block .prism-code .token.punctuation,
.code-block .prism-code .token.entity {
    color: var(--code-text);
}
.code-block .prism-code .token.attr-name,
.code-block .prism-code .token.class-name,
.code-block .prism-code .token.boolean,
.code-block .prism-code .token.constant,
.code-block .prism-code .token.number,
.code-block .prism-code .token.atrule,
.code-block .prism-code .token.builtin,
.code-block .prism-code .token.char,
.code-block .prism-code .token.inserted {
    color: light-dark(hsl(35, 99%, 36%), hsl(29, 54%, 61%));
}
.code-block .prism-code .token.keyword {
    color: light-dark(hsl(301, 63%, 40%), hsl(286, 60%, 67%));
}
.code-block .prism-code .token.operator,
.code-block .prism-code .token.function,
.code-block .prism-code .token.url {
    color: light-dark(hsl(221, 87%, 60%), hsl(207, 82%, 66%));
}
.code-block .prism-code .token.property,
.code-block .prism-code .token.tag,
.code-block .prism-code .token.symbol,
.code-block .prism-code .token.deleted,
.code-block .prism-code .token.important {
    color: light-dark(hsl(5, 74%, 59%), hsl(355, 65%, 65%));
}
.code-block .prism-code .token.selector,
.code-block .prism-code .token.string,
.code-block .prism-code .token.regex,
.code-block .prism-code .token.attr-value,
.code-block .prism-code .token.attr-value > .token.punctuation {
    color: light-dark(hsl(119, 34%, 47%), hsl(95, 38%, 62%));
}
.code-block .prism-code .token.variable,
.code-block .prism-code .token.parameter,
.code-block .prism-code .token.namespace,
.code-block .prism-code .token.placeholder {
    color: light-dark(hsl(205, 82%, 48%), hsl(187, 47%, 55%));
}
.code-block .prism-code .token.italic,
.code-block .prism-code .token.emphasis {
    font-style: italic;
}
.code-block .prism-code .token.bold,
.code-block .prism-code .token.important {
    font-weight: 700;
}
.code-block .prism-code .token.entity {
    cursor: help;
}
.code-block .prism-code .language-css .token.string,
.code-block .prism-code .style .token.string,
.code-block .prism-code .token.maybe-class-name {
    color: light-dark(hsl(5, 74%, 59%), hsl(355, 65%, 65%));
}
.code-block .prism-code .language-json .token.operator,
.code-block .prism-code .language-json5 .token.operator,
.code-block .prism-code .language-markdown .token.url,
.code-block .prism-code .language-markdown .token.url > .token.operator,
.code-block .prism-code .language-markdown .token.url-reference.url > .token.string {
    color: var(--code-text);
}
.code-block .code-preview {
    padding: 0.98em 1.05em 1.08em;
    background: var(--code-surface-raised);
    border-top: 1px solid var(--code-separator);
}
.code-block .code-preview svg {
    display: block;
    max-width: 100%;
    height: auto;
}
.code-block .code-preview .diagram-preview,
.code-block .code-preview .diagram-preview * {
    font-family: 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', 'Noto Sans CJK SC', 'Source Han Sans SC', 'Heiti SC', 'WenQuanYi Micro Hei', sans-serif;
}
.code-block .code-preview .preview-error {
    margin: 0;
    padding: 0.75em 0.9em;
    border-radius: 8px;
    font-size: 0.86em;
    line-height: 1.45;
    white-space: pre-wrap;
    border: 1px solid light-dark(#fecaca, #7f1d1d);
    background: light-dark(#fef2f2, #2a1212);
    color: light-dark(#991b1b, #fca5a5);
}
.code-block .line-numbers-gutter {
    display: none;
    flex: 0 0 auto;
    padding: 0.95em 0.6em 1.05em 0.8em;
    font-family: var(--code-font);
    font-size: 0.85em;
    line-height: 1.58;
    color: var(--code-muted);
    text-align: right;
    white-space: pre;
    user-select: none;
    -webkit-user-select: none;
    opacity: 0.55;
    border-right: 1px solid var(--code-separator);
}
.code-block.show-line-numbers .code-raw {
    display: flex;
}
.code-block.show-line-numbers .line-numbers-gutter {
    display: block;
}
.code-block.show-line-numbers pre {
    flex: 1;
    min-width: 0;
}
.code-block.show-line-numbers .prism-code {
    padding-left: 0.75em;
}
/* Collapsible (height-limited) code block */
.code-block .code-content-wrapper {
    position: relative;
}
.code-block .code-content-wrapper.is-height-collapsed .code-content {
    max-height: var(--code-collapse-height, 480px);
    overflow: hidden;
}
.code-block .code-content-wrapper.is-height-collapsed::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 88px;
    background: linear-gradient(to bottom, transparent 0%, var(--code-surface) 100%);
    background: linear-gradient(to bottom, transparent 0%, color-mix(in srgb, var(--code-surface) 78%, transparent) 62%, var(--code-surface) 100%);
    pointer-events: none;
    border-radius: 0 0 12px 12px;
}
.code-block .code-expand-bar {
    display: none;
    justify-content: center;
    padding: 30px 0 10px;
    margin-top: -34px;
    background: linear-gradient(to bottom, transparent 0%, var(--code-surface-raised) 100%);
    background: linear-gradient(to bottom, color-mix(in srgb, var(--code-surface) 10%, transparent) 0%, color-mix(in srgb, var(--code-surface) 80%, transparent) 42%, var(--code-surface-raised) 100%);
    border-radius: 0 0 12px 12px;
    position: relative;
    z-index: 1;
}
.code-block.is-height-collapsible .code-expand-bar {
    display: flex;
}
.code-block .code-expand-pill {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 5px 11px;
    border-radius: 100px;
    border: 1px solid color-mix(in srgb, var(--code-border) 72%, transparent);
    background: color-mix(in srgb, var(--code-surface) 88%, transparent);
    color: var(--code-muted);
    font-family: var(--body-font);
    font-size: 0.72em;
    font-weight: 550;
    line-height: 1;
    cursor: pointer;
    user-select: none;
    -webkit-user-select: none;
    box-shadow: 0 4px 12px rgba(15, 23, 42, 0.08);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    transition: background 0.15s, color 0.15s, border-color 0.15s, box-shadow 0.15s;
    outline: none;
    -webkit-tap-highlight-color: transparent;
}
.code-block .code-expand-pill:hover {
    background: var(--code-button-hover-bg);
    color: var(--code-button-hover-fg);
    border-color: light-dark(rgba(0, 0, 0, 0.12), rgba(255, 255, 255, 0.12));
    box-shadow: 0 6px 14px rgba(15, 23, 42, 0.10);
}
.code-block .code-expand-pill:focus { outline: none; }
.code-block .code-expand-pill:focus-visible {
    box-shadow: 0 0 0 2px light-dark(rgba(0, 0, 0, 0.1), rgba(255, 255, 255, 0.12));
}
.code-block .code-expand-pill svg {
    width: 12px;
    height: 12px;
    flex: 0 0 auto;
    transition: transform 0.18s ease;
}
.code-block .code-expand-pill.is-expanded svg {
    transform: rotate(180deg);
}
.code-block .code-expand-bar:has(.is-expanded) {
    margin-top: 0;
    padding-top: 10px;
    background: var(--code-surface-raised);
}
.code-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 8px;
    padding: 0.38em 0.72em 0.38em 0.86em;
    background: linear-gradient(180deg, var(--code-header-top), var(--code-header-bottom));
    border-bottom: 1px solid var(--code-separator);
    font-size: 0.75em;
    color: var(--code-muted);
    user-select: none;
    -webkit-user-select: none;
}
.code-header .code-header-leading {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    min-width: 0;
}
.code-header .lang-label {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-weight: 600;
    text-transform: lowercase;
    letter-spacing: 0.025em;
}
.code-header .lang-label .lang-logo {
    width: 14px;
    height: 14px;
    border-radius: 3px;
    object-fit: contain;
    flex: 0 0 auto;
}
@media (prefers-color-scheme: dark) {
    .code-header .lang-label .lang-logo {
        filter: brightness(1.6);
    }
}
.code-header .lang-label .lang-logo-fallback {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 14px;
    height: 14px;
    border-radius: 3px;
    font-size: 9px;
    line-height: 1;
    text-transform: uppercase;
    background: light-dark(#e2e8f0, #334155);
    color: light-dark(#334155, #e2e8f0);
}
.code-header .lang-label .lang-text {
    line-height: 1;
}
.code-header .code-actions {
    display: inline-flex;
    align-items: center;
    gap: 4px;
}
.code-header .copy-btn,
.code-header .render-btn,
.code-header .line-numbers-btn {
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 4px;
    justify-content: center;
    width: 2em;
    height: 2em;
    padding: 0;
    border-radius: 6px;
    border: none;
    background: transparent;
    color: var(--code-muted);
    font-size: 0.95em;
    line-height: 1;
    opacity: 0.7;
    transition: opacity 0.15s ease, background 0.15s ease, color 0.15s ease;
    outline: none;
    -webkit-tap-highlight-color: transparent;
}
.code-header .fold-btn {
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 4px;
    justify-content: center;
    width: 2em;
    height: 2em;
    padding: 0;
    border-radius: 6px;
    border: none;
    background: transparent;
    color: var(--code-muted);
    font-size: 0.95em;
    line-height: 1;
    opacity: 0.7;
    transition: opacity 0.15s ease, background 0.15s ease, color 0.15s ease;
    outline: none;
    -webkit-tap-highlight-color: transparent;
}
.code-header .copy-btn:hover,
.code-header .render-btn:hover,
.code-header .fold-btn:hover,
.code-header .line-numbers-btn:hover {
    opacity: 1;
    background: var(--code-button-hover-bg);
    color: var(--code-button-hover-fg);
}
.code-header .copy-btn:active,
.code-header .render-btn:active,
.code-header .fold-btn:active,
.code-header .line-numbers-btn:active {
    background: var(--code-button-active-bg);
}
.code-header .copy-btn:focus,
.code-header .render-btn:focus,
.code-header .fold-btn:focus,
.code-header .line-numbers-btn:focus {
    outline: none;
}
.code-header .copy-btn:focus-visible,
.code-header .render-btn:focus-visible,
.code-header .fold-btn:focus-visible,
.code-header .line-numbers-btn:focus-visible {
    box-shadow: 0 0 0 2px light-dark(rgba(0, 0, 0, 0.1), rgba(255, 255, 255, 0.12));
}
.code-header .copy-btn.copied {
    opacity: 1;
    color: light-dark(hsl(119, 34%, 40%), hsl(95, 38%, 62%));
}
.code-header .render-btn.is-active {
    opacity: 0.88;
    color: var(--code-button-hover-fg);
    background: var(--code-button-active-bg);
}
.code-header .render-btn.is-loading {
    opacity: 0.55;
    cursor: progress;
}
.code-header .fold-btn.is-folded svg {
    transform: rotate(-90deg);
}
.code-header .line-numbers-btn.is-active {
    opacity: 0.88;
    color: var(--code-button-hover-fg);
    background: var(--code-button-active-bg);
}
.code-header .copy-btn svg,
.code-header .render-btn svg,
.code-header .fold-btn svg,
.code-header .line-numbers-btn svg {
    width: 14px;
    height: 14px;
    transition: transform 0.18s ease;
}
blockquote {
    border-left: 3px solid light-dark(#d0d7de, #444c56);
    padding: 0.2em 0 0.2em 1em;
    margin: 0.6em 0;
    color: light-dark(#57606a, #8b949e);
}
ul, ol { padding-left: 1.5em; margin-bottom: 0.6em; }
li { margin-bottom: 0.25em; }
table { border-collapse: collapse; margin: 0.6em 0; width: auto; overflow-x: auto; display: block; }
th, td { border: 1px solid light-dark(#d0d7de, #444c56); padding: 0.4em 0.8em; text-align: left; }
th { background: light-dark(#f6f8fa, #161b22); font-weight: 600; }
hr { border: none; border-top: 1px solid light-dark(#d0d7de, #444c56); margin: 1em 0; }
img { max-width: 100%%; height: auto; border-radius: 6px; }
</style>
</head>
<body>
<div id="content"></div>
<!-- INLINE_CORE_RUNTIME -->
<script src="markdown-core-runtime.js"></script>
<script src="markdown-render-runtime.js"></script>
</body>
</html>
